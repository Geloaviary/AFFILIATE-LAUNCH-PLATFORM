<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Affiliate Launch Platform</title>

<style>

:root{
  --bg:#f8fafc;
  --sidebar:#0f172a;
  --sidebar-hover:#1e293b;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
  --success:#16a34a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:
    Inter,
    system-ui,
    sans-serif;

  background:var(--bg);
  color:var(--text);
}

#app{
  display:flex;
  min-height:100vh;
}

#sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  display:flex;
  flex-direction:column;
}

.logo{
  padding:24px;
  font-size:20px;
  font-weight:700;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.nav{
  padding:16px;
}

.nav button{
  width:100%;
  border:none;
  background:none;
  color:white;
  text-align:left;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:6px;
}

.nav button:hover{
  background:var(--sidebar-hover);
}

#content{
  flex:1;
  display:flex;
  flex-direction:column;
}

#topbar{
  height:70px;
  background:white;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
}

#workspace{
  padding:24px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}

.page-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
}

</style>
</head>

<body>

<div id="app">

  <aside id="sidebar">

    <div class="logo">
      Affiliate Launch
    </div>

    <div class="nav">

      <button data-page="dashboard">
        Dashboard
      </button>

      <button data-page="campaigns">
        Campaigns
      </button>

      <button data-page="research">
        Research
      </button>

      <button data-page="strategy">
        Strategy
      </button>

      <button data-page="production">
        Production
      </button>

      <button data-page="compliance">
        Compliance
      </button>

      <button data-page="publishing">
        Publishing
      </button>

      <button data-page="analytics">
        Analytics
      </button>

      <button data-page="settings">
        Settings
      </button>

    </div>

  </aside>

  <div id="content">

    <div id="topbar">

      <h3>
        Affiliate Launch Platform
      </h3>

      <div>
        Production Mode
      </div>

    </div>

    <div id="workspace">

      <section
        id="dashboard"
        class="page active"
      >
        <h1 class="page-title">
          Dashboard
        </h1>
      </section>

      <section
  id="campaigns"
  class="page"
>

<h1 class="page-title">
  Campaigns
</h1>

<div
  style="
    display:grid;
    grid-template-columns:
      350px 1fr;
    gap:20px;
  "
>

  <div class="card">

    <h3>
      Create Campaign
    </h3>

    <input
      id="campaignName"
      placeholder="Campaign Name"
      style="
        width:100%;
        padding:12px;
        margin-top:12px;
      "
    >

    <input
      id="campaignProductUrl"
      placeholder="Product URL"
      style="
        width:100%;
        padding:12px;
        margin-top:12px;
      "
    >

    <input
      id="campaignAffiliateUrl"
      placeholder="Affiliate URL"
      style="
        width:100%;
        padding:12px;
        margin-top:12px;
      "
    >

    <input
      id="campaignNiche"
      placeholder="Niche"
      style="
        width:100%;
        padding:12px;
        margin-top:12px;
      "
    >

    <button
      id="createCampaignBtn"
      style="
        width:100%;
        margin-top:12px;
      "
    >
      Create Campaign
    </button>

  </div>

  <div class="card">

    <h3>
      Campaign Portfolio
    </h3>

    <div
      id="campaignList"
      style="
        margin-top:20px;
      "
    >
      Loading campaigns...
    </div>

  </div>

</div>

</section>

      <section
        id="research"
        class="page"
      >
        <h1 class="page-title">
          Research
        </h1>
      </section>

      <section
        id="strategy"
        class="page"
      >
        <h1 class="page-title">
          Strategy
        </h1>
      </section>

      <section
        id="production"
        class="page"
      >
        <h1 class="page-title">
          Production
        </h1>
      </section>

      <section
        id="compliance"
        class="page"
      >
        <h1 class="page-title">
          Compliance
        </h1>
      </section>

      <section
        id="publishing"
        class="page"
      >
        <h1 class="page-title">
          Publishing
        </h1>
      </section>

      <section
        id="analytics"
        class="page"
      >
        <h1 class="page-title">
          Analytics
        </h1>
      </section>

      <section
        id="settings"
        class="page"
      >
        <h1 class="page-title">
          Settings
        </h1>
      </section>

    </div>

  </div>

</div>

<script>

let campaigns = [];
let activeCampaign = null;

async function apiCall(
  endpoint,
  method='GET',
  body=null
){

  const options = {
    method,
    headers:{
      'Content-Type':
      'application/json'
    }
  };

  if(body){
    options.body =
      JSON.stringify(body);
  }

  const response =
    await fetch(
      '/api/' + endpoint,
      options
    );

  return response.json();

}

async function loadCampaigns(){

  const data =
    await apiCall(
      'manage-campaigns?userId=admin'
    );

  campaigns =
    data.campaigns || [];

  console.log(
    'Campaigns Loaded:',
    campaigns
  );

}

document
  .querySelectorAll(
    '#sidebar button'
  )
  .forEach(btn => {

    btn.addEventListener(
      'click',
      () => {

        document
          .querySelectorAll(
            '.page'
          )
          .forEach(
            p => p.classList.remove(
              'active'
            )
          );

        document
          .getElementById(
            btn.dataset.page
          )
          .classList.add(
            'active'
          );

      }
    );

  });

  (async function(){

  await loadCampaigns();

})();

</script>

</body>
</html>
