<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Affiliate Launch Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a, #1e293b); padding: 1rem; }
    .card { background: #fff; padding: 2.5rem 2rem; border-radius: 1.25rem; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.75rem; color: #0f172a; margin-bottom: 0.5rem; }
    p { color: #64748b; margin-bottom: 1rem; }
    input { width: 100%; padding: 0.9rem; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; margin-bottom: 0.75rem; text-align: center; }
    button { width: 100%; padding: 0.9rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 0.75rem; background: #0f172a; color: #fff; cursor: pointer; }
    button:hover { background: #1e293b; }
    .error { color: #dc2626; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛠️</div>
    <h1>Affiliate Launch Platform</h1>
    <p>Enter your password to continue</p>
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">🔐 Sign In</button>
    <p class="error" id="error"></p>
  </div>

  <script>
    // Set your master password here
    const MASTER_PASSWORD = "admin4774";

    function login() {
      const pw = document.getElementById('password').value;
      if (pw === MASTER_PASSWORD) {
        localStorage.setItem('auth', 'true');
        window.location.href = '/app.html';
      } else {
        document.getElementById('error').textContent = 'Incorrect password';
      }
    }

    // If already logged in, redirect
    if (localStorage.getItem('auth') === 'true') {
      window.location.href = '/app.html';
    }
  </script>
</body>
</html>
