<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Launch Platform Login</title>

<style>
body{
  font-family:system-ui,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}

.card{
  background:white;
  padding:2rem;
  border-radius:16px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
}

h1{
  text-align:center;
  margin-bottom:1rem;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  cursor:pointer;
}

.error{
  color:red;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="card">
  <h1>🚀 Affiliate Launch Platform</h1>

<input
type="password"
id="password"
placeholder="Password"

>

  <button onclick="login()">
    Login
  </button>

  <div id="error" class="error"></div>
</div>

<script>
const MASTER_PASSWORD = "admin4774";

function login() {
  const pw = document.getElementById("password").value;

  if (pw === MASTER_PASSWORD) {
    localStorage.setItem("auth", "true");
    window.location.href = "/app.html";
  } else {
    document.getElementById("error").textContent =
      "Incorrect password";
  }
}

if (localStorage.getItem("auth") === "true") {
  window.location.href = "/app.html";
}
</script>

</body>
</html>
